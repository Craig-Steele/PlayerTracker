<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Turn Track</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="header-bar">
  	<div id="header-bar-left">
      <div class="campaign-header">
        <img id="ruleset-icon" class="ruleset-icon" alt="" />
        <div class="campaign-text">
          <h1 id="campaign-name">Campaign</h1>
          <div class="ruleset-meta">
            <a id="ruleset-link" class="ruleset-label" href="#" target="_blank" rel="noopener"></a>
            <span id="ruleset-license-wrap" class="ruleset-license-wrap">
              (<a id="ruleset-license" class="ruleset-license" href="#" target="_blank" rel="noopener">license</a>)
            </span>
          </div>
        </div>
      </div>
    </div>
  	<div id="header-bar-right">
      <div id="ip-display"></div>
      <div id="qr-container"></div>
    </div>
  </div>

  <div class="container">
    <!-- LEFT: Player list -->
    <section class="player-list">
      <div class="round-row">
        <div id="round-info" class="subtitle"></div>
        <button id="turn-complete">Turn Complete</button>
      </div>
      <div id="current-actor" class="subtitle current-actor"></div>
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Character</th>
            <th id="health-heading">HP</th>
            <th class="conditions-col">Conditions</th>
          </tr>
        </thead>
        <tbody id="players-body"></tbody>
      </table>

      <div class="toolbar" id="list-toolbar"></div>

      <!-- Admin-only area: this will be hidden unless hostname is localhost -->
      <div class="toolbar" id="admin-toolbar" style="margin-top: 1rem; display: none;">
        <button id="clear" class="danger">Clear Initiative list</button>
      </div>
    </section>

    <!-- RIGHT: Detail / form + optional admin controls -->
    <section class="detail-panel">
      <form id="player-form">
        <input type="text" id="owner-name" class="visually-hidden" aria-hidden="true" />
        <div class="character-drawer">
          <div class="character-drawer-header">
            <div class="character-drawer-title" id="character-drawer-title">My Characters</div>
            <div class="character-drawer-player">
              <div id="player-name-display" class="player-name-display">
                <input type="text" id="player-name-input" aria-label="Player name" readonly />
                <button type="button" id="edit-player-name" class="icon-button" aria-label="Edit player name">✎</button>
              </div>
              <div id="player-name-edit" class="player-name-edit">
                <div class="player-name-actions">
                  <button type="button" id="player-name-save" class="icon-button icon-button-success" aria-label="Save player name">✓</button>
                  <button type="button" id="player-name-cancel" class="icon-button icon-button-danger" aria-label="Cancel player name edit">✕</button>
                </div>
              </div>
            </div>
          </div>
          <div id="character-list" class="character-list"></div>
          <div class="character-list-actions">
            <button type="button" id="character-add" class="icon-button" aria-label="Add character">+</button>
            <button type="button" id="character-remove" class="icon-button" aria-label="Remove selected character">−</button>
          </div>
          <div id="add-character-form" class="details-panel-collapsed property-sheet" aria-hidden="true">
            <div class="form-section-title">New Character Name</div>
            <label class="property-row">
              <span class="property-label">Character name</span>
              <span class="property-control">
                <input type="text" id="add-name" required />
              </span>
            </label>
            <div class="form-section-title">Initiative</div>
            <div class="initiative-settings form-section-block">
              <label class="property-toggle-row">
                <span class="property-label">App Roll</span>
                <span class="property-toggle-control">
                  <input type="checkbox" id="add-use-app-initiative-roll" checked />
                  <span>Use app to roll initiative</span>
                </span>
              </label>
              <label id="add-initiative-bonus-wrap" class="property-row">
                <span class="property-label">Initiative Bonus</span>
                <span class="property-control">
                <input type="text" id="add-initiative-bonus" value="" inputmode="numeric" pattern="[+-]?[0-9]*" />
                </span>
              </label>
              <label class="property-toggle-row">
                <span class="property-label">Auto Skip</span>
                <span class="property-toggle-control">
                  <input type="checkbox" id="add-auto-skip-turn" />
                  <span>Automatically skip this character's turn</span>
                </span>
              </label>
            </div>
            <div class="form-section-title">Stats</div>
            <div class="form-section-block">
              <label class="property-toggle-row">
                <span class="property-label">Visibility</span>
                <span class="property-toggle-control">
                  <input type="checkbox" id="add-reveal-stats" />
                  <span>Share stats with others</span>
                </span>
              </label>
            </div>
            <div id="add-stats-fields"></div>
            <div id="add-current-stats" class="add-current-stats"></div>
            <div class="add-form-actions">
              <button type="button" id="add-save">Save</button>
              <button type="button" id="add-cancel" class="secondary">Cancel</button>
            </div>
          </div>
        </div>
        <div id="current-stats-inputs" class="visually-hidden" aria-hidden="true"></div>
        <div class="details-toggles">
          <button type="button" id="details-toggle" class="details-toggle" aria-expanded="false">
            Details
          </button>
          <button type="button" id="conditions-toggle" class="details-toggle conditions-toggle" aria-expanded="false">
            Conditions
          </button>
        </div>
        <div id="details-panel" class="details-panel-collapsed property-sheet" aria-hidden="true">
          <div class="form-section-title">Character Name</div>
          <label class="property-row">
            <span class="property-label">Character name</span>
            <span class="property-control">
              <input type="text" id="name" required />
            </span>
          </label>
          <div class="form-section-title">Initiative</div>
          <div class="initiative-settings form-section-block">
            <label class="property-toggle-row">
              <span class="property-label">App Roll</span>
              <span class="property-toggle-control">
                <input type="checkbox" id="use-app-initiative-roll" checked />
                <span>Use app to roll initiative</span>
              </span>
            </label>
            <label id="initiative-bonus-wrap" class="property-row">
              <span class="property-label">Initiative Bonus</span>
              <span class="property-control">
                <input type="text" id="initiative-bonus" value="0" inputmode="numeric" pattern="[+-]?[0-9]*" />
              </span>
            </label>
            <label class="property-toggle-row">
              <span class="property-label">Auto Skip</span>
              <span class="property-toggle-control">
                <input type="checkbox" id="auto-skip-turn" />
                <span>Automatically skip this character's turn</span>
              </span>
            </label>
          </div>
          <div class="form-section-title">Stats</div>
          <div class="form-section-block">
            <label class="property-toggle-row">
              <span class="property-label">Visibility</span>
              <span class="property-toggle-control">
                <input type="checkbox" id="reveal-stats" />
                <span>Share stats with others</span>
              </span>
            </label>
          </div>
          <div id="stats-fields"></div>
        </div>
        <div class="conditions-section">
          <div class="conditions-section-header"></div>
          <div id="conditions-panel" class="conditions-panel-collapsed" aria-hidden="true">
            <input type="search" id="condition-filter" placeholder="Filter list…" />
            <p id="form-help">Select the conditions affecting <span id="conditions-character">this character</span>.</p>
            <div id="conditions-grid" class="conditions-grid"></div>
            <div id="selected-conditions" class="selected-conditions"></div>
          </div>
        </div>
      </form>
      <div id="status"></div>
    </section>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="shared.js"></script>
  <script src="app.js"></script>
</body>
</html>

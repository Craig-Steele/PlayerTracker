<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Roll4Initiative</title>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="stylesheet" href="style.css?v=100">
</head>
<body class="join-page">
  <div class="display-page-header">
    <div class="player-campaign-card join-campaign-card">
      <img id="join-ruleset-icon" class="ruleset-icon" src="/favicon-512.png" alt="Roll4Initiative icon" />
      <div class="player-campaign-text">
        <div id="join-campaign-name" class="player-campaign-name">Roll4Initiative</div>
        <div class="ruleset-meta player-ruleset-meta">
          <a id="join-ruleset-link" class="ruleset-label" href="#" target="_blank" rel="noopener"></a>
          <span id="join-ruleset-license-wrap" class="ruleset-license-wrap">
            (<a id="join-ruleset-license" class="ruleset-license" href="#" target="_blank" rel="noopener">license</a>)
          </span>
        </div>
        <div class="player-campaign-meta">Enter your player name to continue.</div>
      </div>
    </div>
  </div>

  <div class="container">
    <section class="detail-panel join-panel">
      <div class="player-campaign-player-row join-player-row">
        <div class="player-campaign-player-info">
          <div class="player-campaign-meta">Player</div>
          <div class="join-player-name-row">
            <div id="join-player-name-display" class="player-campaign-player-name">Player</div>
            <button type="button" id="join-player-name-edit-btn" class="icon-button join-player-edit-button" aria-label="Edit player name">✎</button>
          </div>
        </div>
      </div>

      <form id="join-form" class="join-form">
        <div class="form-section-block property-group">
          <label class="property-row">
            <span class="property-label">Player Name</span>
            <span class="property-control">
              <input type="text" id="join-player-name" autocomplete="nickname" />
            </span>
          </label>
        </div>
        <div class="join-actions">
          <button type="submit" id="join-continue">Join</button>
          <button type="button" id="join-player-name-cancel" class="hidden">Cancel</button>
        </div>
      </form>
      <div id="join-status" class="subtitle join-status"></div>
    </section>

    <section id="join-campaigns-panel" class="detail-panel join-panel join-campaigns-panel hidden" aria-live="polite">
      <div class="section-header join-campaigns-header">
        <h2>Your Campaigns</h2>
      </div>
      <div id="join-campaign-list" class="join-campaign-list"></div>
    </section>
  </div>

  <script src="shared.js?v=3"></script>
  <script src="player-name.js?v=1"></script>
  <script src="ruleset.js?v=2"></script>
  <script src="join-state.js?v=2"></script>
  <script src="join.js?v=3"></script>
</body>
</html>

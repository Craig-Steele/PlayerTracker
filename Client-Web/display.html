<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Roll4Initiative</title>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="stylesheet" href="style.css?v=92">
</head>
<body class="display-only">
  <div class="display-page-header">
    <div class="player-campaign-card display-campaign-card">
      <img id="display-ruleset-icon" class="ruleset-icon" alt="" />
      <div class="player-campaign-text">
        <div id="display-campaign-name" class="player-campaign-name">Roll4Initiative</div>
        <div class="ruleset-meta player-ruleset-meta">
          <a id="display-ruleset-link" class="ruleset-label" href="#" target="_blank" rel="noopener"></a>
          <span id="display-ruleset-license-wrap" class="ruleset-license-wrap">
            (<a id="display-ruleset-license" class="ruleset-license" href="#" target="_blank" rel="noopener">license</a>)
          </span>
        </div>
        <div id="display-encounter-state" class="player-campaign-meta">Encounter: New</div>
      </div>
      <div class="display-header-side">
        <div class="display-join-controls">
          <select id="ip-selector" class="ip-selector hidden" aria-label="Address selection"></select>
        </div>
        <div id="qr-container"></div>
      </div>
    </div>
  </div>

  <div class="container">
    <section class="character-list">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Character</th>
            <th id="health-heading">Health</th>
            <th class="conditions-col">Conditions</th>
          </tr>
        </thead>
        <tbody id="players-body"></tbody>
      </table>
      <div id="display-roster-columns" class="display-roster-columns hidden" aria-hidden="true">
        <div class="display-roster-columns-grid">
          <table class="display-roster-column-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Character</th>
                <th id="display-left-health-heading">Health</th>
                <th class="conditions-col">Conditions</th>
              </tr>
            </thead>
            <tbody id="display-players-body-left"></tbody>
          </table>
          <table class="display-roster-column-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Character</th>
                <th id="display-right-health-heading">Health</th>
                <th class="conditions-col">Conditions</th>
              </tr>
            </thead>
            <tbody id="display-players-body-right"></tbody>
          </table>
        </div>
      </div>
      <div id="status"></div>
    </section>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="shared.js?v=3"></script>
  <script src="live-stream.js?v=2"></script>
  <script src="inventory-id.js?v=1"></script>
  <script src="player-name.js?v=1"></script>
  <script src="stat-inputs.js?v=1"></script>
  <script src="player-name-save.js?v=1"></script>
  <script src="ruleset.js?v=1"></script>
  <script src="encounter.js?v=3"></script>
  <script src="app.js?v=122"></script>
</body>
</html>

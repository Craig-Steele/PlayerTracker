<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Campaign - Referee</title>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="stylesheet" href="style.css">
</head>
<body class="referee-page">
  <div class="referee-page-header">
    <div class="player-campaign-card referee-campaign-card">
      <img id="ref-ruleset-icon" class="ruleset-icon" alt="" />
      <div class="player-campaign-text">
        <div id="ref-campaign-name" class="player-campaign-name">Campaign</div>
        <div class="ruleset-meta player-ruleset-meta">
          <a id="ref-ruleset-link" class="ruleset-label" href="#" target="_blank" rel="noopener"></a>
          <span id="ref-ruleset-license-wrap" class="ruleset-license-wrap">
            (<a id="ref-ruleset-license" class="ruleset-license" href="#" target="_blank" rel="noopener">license</a>)
          </span>
        </div>
        <div id="ref-encounter-state" class="player-campaign-meta">Encounter: New</div>
      </div>
      <div class="referee-card-actions">
        <a href="admin.html" id="ref-campaign-settings" class="referee-settings-button" aria-label="Campaign admin"></a>
      </div>
    </div>
  </div>

  <div class="container referee-container">
    <section class="player-list">
      <div class="encounter-controls">
        <button type="button" id="encounter-new">New Encounter</button>
        <button type="button" id="encounter-start">Start Encounter</button>
        <button type="button" id="encounter-suspend">Suspend Encounter</button>
        <button id="turn-complete">Turn Complete</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Character</th>
            <th id="health-heading">HP</th>
            <th class="conditions-col">Conditions</th>
            <th class="act-col">Act</th>
          </tr>
        </thead>
        <tbody id="players-body"></tbody>
      </table>
      <div id="status" class="subtitle"></div>
    </section>

    <section class="detail-panel referee-panel">
      <div class="character-drawer referee-drawer">
        <label class="ref-filter">
          <input type="checkbox" id="ref-hide-pcs" checked />
          Show NPCs only
        </label>
        <div id="referee-character-list" class="character-list"></div>
        <div id="ref-selection-toolbar-anchor" class="hidden">
          <div class="details-toggles referee-toggles">
            <button type="button" id="ref-details-toggle" class="details-toggle" aria-expanded="false">
              Details
            </button>
            <button type="button" id="ref-conditions-toggle" class="details-toggle conditions-toggle" aria-expanded="false">
              Conditions
            </button>
            <button type="button" id="ref-reveal-now" class="details-toggle" aria-expanded="false">
              Reveal Immediately
            </button>
            <button type="button" id="ref-reveal-turn" class="details-toggle" aria-expanded="false">
              Reveal On Turn
            </button>
            <button type="button" id="ref-hide-character" class="details-toggle" aria-expanded="false">
              Hide
            </button>
          </div>
        </div>
        <div class="character-list-actions referee-list-actions">
          <button type="button" id="ref-add-button" class="icon-button" aria-label="Add character">+</button>
          <button type="button" id="ref-remove-button" class="icon-button" aria-label="Remove selected character">−</button>
        </div>
        <form id="ref-add-panel" class="details-panel-collapsed property-sheet hidden" aria-hidden="true">
          <div class="conditions-dialog" role="dialog" aria-modal="true" aria-labelledby="ref-add-dialog-title">
            <div class="conditions-dialog-header">
              <h2 id="ref-add-dialog-title">Add Character</h2>
              <div class="conditions-dialog-actions">
                <button type="submit">Save</button>
                <button type="button" id="ref-add-cancel" class="secondary">Cancel</button>
              </div>
            </div>
            <div class="form-section-block property-group">
              <label class="property-row">
                <span class="property-label">Character name</span>
                <span class="property-control">
                  <input type="text" id="ref-name" required />
                </span>
              </label>
              <label class="property-row">
                <span class="property-label">Quantity</span>
                <span class="property-control">
                  <input type="number" id="ref-quantity" min="1" value="1" required />
                </span>
              </label>
              <label class="property-toggle-row">
                <span class="property-label">Visibility</span>
                <span class="property-toggle-control">
                  <input type="checkbox" id="ref-visible" />
                  <span>Start revealed</span>
                </span>
              </label>
            </div>
            <div class="form-section-block property-group">
              <label id="ref-initiative-bonus-wrap" class="property-row">
                <span class="property-label">Initiative Bonus</span>
                <span class="property-control">
                  <input type="number" id="ref-initiative-bonus" value="" />
                </span>
              </label>
              <div id="ref-stats-fields"></div>
              <div id="ref-add-current-stats" class="add-current-stats"></div>
            </div>
          </div>
        </form>
      </div>

      <div class="referee-block">
        <div id="ref-editor-empty" class="subtitle">Select a character to edit details.</div>
        <form id="ref-editor" class="ref-editor hidden">
          <div id="ref-details-panel" class="details-panel-collapsed property-sheet hidden" aria-hidden="true">
            <div class="conditions-dialog" role="dialog" aria-modal="true" aria-labelledby="ref-details-dialog-title">
              <div class="conditions-dialog-header">
                <h2 id="ref-details-dialog-title">Details</h2>
                <div class="conditions-dialog-actions">
                  <button type="button" id="ref-details-cancel" class="secondary">Cancel</button>
                  <button type="button" id="ref-details-save">Save</button>
                </div>
              </div>
              <div class="form-section-block property-group">
                <label class="property-row">
                  <span class="property-label">Character name</span>
                  <span class="property-control">
                    <input type="text" id="ref-edit-name" required />
                  </span>
                </label>
              </div>
              <div class="form-section-block property-group">
                <label id="ref-edit-initiative-bonus-wrap" class="property-row">
                  <span class="property-label">Initiative Bonus</span>
                  <span class="property-control">
                    <input type="number" id="ref-edit-initiative-bonus" value="" />
                  </span>
                </label>
                <div id="ref-edit-stats"></div>
                <div id="ref-edit-current-stats" class="ref-current-stats"></div>
              </div>
            </div>
          </div>
          <div id="ref-conditions-panel" class="conditions-panel-collapsed hidden" aria-hidden="true">
            <div class="conditions-dialog" role="dialog" aria-modal="true" aria-labelledby="ref-conditions-dialog-title">
              <div class="conditions-dialog-header">
                <h2 id="ref-conditions-dialog-title">Conditions</h2>
                <div class="conditions-dialog-actions">
                  <button type="button" id="ref-conditions-cancel" class="secondary">Cancel</button>
                  <button type="button" id="ref-conditions-save">Save</button>
                </div>
              </div>
              <input type="search" id="ref-condition-filter" placeholder="Filter list…" />
              <div id="ref-conditions-grid" class="conditions-grid"></div>
              <div id="ref-selected-conditions" class="selected-conditions"></div>
            </div>
          </div>
        </form>
      </div>
    </section>
  </div>

  <script src="shared.js?v=2"></script>
  <script src="ruleset.js?v=1"></script>
  <script src="encounter.js?v=1"></script>
  <script src="referee.js?v=9"></script>
</body>
</html>
